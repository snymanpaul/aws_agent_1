<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AG-UI · Strands + Gemini</title>
<style>
  :root{
    --bg:#0f1419; --panel:#161b22; --line:#232a33; --muted:#8b96a5;
    --user:#2563eb; --assistant:#1c2530; --text:#e6edf3; --tool:#d8932b; --tool-bg:#1d1a12;
    --accent:#3b82f6; --ok:#2ecc71; --think:#9aa7b8;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  .app{display:flex;flex-direction:column;height:100vh}
  header{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
  header .dot{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
  header b{font-size:15px} header .meta{color:var(--muted);font-size:13px} header .sub{color:var(--muted);font-size:12.5px;margin-left:auto}
  .body{flex:1;display:flex;min-height:0}
  #chat{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px}
  .side{width:300px;border-left:1px solid var(--line);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:20px;background:#0c1116}
  .side h3{margin:0 0 8px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .steps{display:flex;flex-direction:column;gap:6px}
  .step{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--muted)}
  .step .mark{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);flex:0 0 16px}
  .step.active{color:var(--text)} .step.active .mark{border-color:var(--accent);animation:pulse 1.1s infinite}
  .step.done{color:var(--text)} .step.done .mark{background:var(--ok);border-color:var(--ok)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.5)}50%{box-shadow:0 0 0 5px rgba(59,130,246,0)}}
  .state{border:1px solid var(--line);border-radius:10px;background:var(--panel);overflow:hidden}
  .state .row{display:flex;justify-content:space-between;gap:10px;padding:8px 12px;border-bottom:1px solid var(--line);font-size:13.5px}
  .state .row:last-child{border-bottom:0}
  .state .k{color:var(--muted)} .state .v{font-family:ui-monospace,Menlo,monospace;color:#cdd9e5;text-align:right;word-break:break-word}
  .state .v.changed{animation:flash .8s}
  @keyframes flash{from{color:var(--accent)}to{color:#cdd9e5}}
  .msg{display:flex;gap:10px;max-width:90%}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .avatar{width:28px;height:28px;border-radius:7px;flex:0 0 28px;display:grid;place-items:center;font-size:14px;margin-top:2px}
  .user .avatar{background:var(--user)} .assistant .avatar{background:#0d2818;border:1px solid #1f5135}
  .turn{display:flex;flex-direction:column;gap:7px;min-width:0}
  .bubble{padding:10px 13px;border-radius:12px;white-space:pre-wrap;word-wrap:break-word}
  .user .bubble{background:var(--user);color:#fff;border-bottom-right-radius:4px}
  .assistant .bubble{background:var(--assistant);border:1px solid var(--line);border-bottom-left-radius:4px}
  .think{font-size:12.5px;color:var(--think);font-style:italic;border-left:2px solid #2b3744;padding:2px 0 2px 10px;white-space:pre-wrap}
  .think .lbl{font-style:normal;color:#5d6b7a;font-size:11px;letter-spacing:.05em}
  .tool{border:1px solid #3a2f15;background:var(--tool-bg);border-radius:9px;overflow:hidden;font-size:13px}
  .tool .hd{padding:7px 11px;color:var(--tool);font-weight:600;display:flex;align-items:center;gap:7px;border-bottom:1px solid #2a230f}
  .tool .bd{padding:8px 11px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;color:#cdb589;white-space:pre-wrap}
  .tool .res{color:#9bdcab;margin-top:4px}
  .wcard{display:flex;align-items:center;gap:16px;border:1px solid #1c3a5e;background:linear-gradient(135deg,#0f2742,#15355a);border-radius:12px;padding:14px 18px;max-width:280px}
  .wcard .ic{font-size:40px;line-height:1}
  .wcard .city{font-size:12px;color:#9bc1e8;text-transform:uppercase;letter-spacing:.07em}
  .wcard .temp{font-size:30px;font-weight:700;line-height:1.15}
  .wcard .cond{font-size:13px;color:#cdd9e5;text-transform:capitalize}
  .picker{border:1px solid #3a2c52;background:#1a1430;border-radius:10px;padding:11px 13px}
  .picker .plabel{font-size:13px;color:#c2b3e6;margin-bottom:8px;font-weight:600}
  .picker button{background:#2a2150;color:#e6dcff;border:1px solid #46396e;margin-right:8px;padding:7px 16px;border-radius:8px;font-size:14px;cursor:pointer}
  .picker button:hover{background:#352a63} .picker button.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .picker button:disabled{opacity:.5;cursor:default}
  .cursor{display:inline-block;width:7px;height:15px;background:var(--accent);margin-left:1px;vertical-align:text-bottom;animation:blink 1s steps(2) infinite}
  @keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}
  form{display:flex;gap:9px;padding:13px 18px;border-top:1px solid var(--line)}
  input{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text);padding:11px 14px;border-radius:10px;font-size:15px;outline:none}
  input:focus{border-color:var(--accent)}
  button{background:var(--accent);color:#fff;border:0;padding:0 18px;border-radius:10px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
<div class="app">
  <header><span class="dot"></span><b>AG-UI</b>
    <span class="meta">Strands + Gemini · serve_ag_ui</span>
    <span class="sub" id="status">idle</span></header>
  <div class="body">
    <div id="chat"></div>
    <aside class="side">
      <div><h3>Steps</h3><div id="steps" class="steps"></div></div>
      <div><h3>Shared state (live)</h3><div id="state" class="state"></div></div>
    </aside>
  </div>
  <form id="f">
    <input id="q" placeholder="Ask about the weather…" autocomplete="off" value="What's the weather in Paris?">
    <button id="send">Send</button>
  </form>
</div>
<script>
const $ = id => document.getElementById(id);
const chat=$('chat'), stepsEl=$('steps'), stateEl=$('state'), statusEl=$('status'), input=$('q'), sendBtn=$('send'), form=$('f');
const el=(t,c,x)=>{const e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e;};
const scroll=()=>chat.scrollTop=chat.scrollHeight;

let STATE={};
function renderState(changed){ stateEl.innerHTML='';
  for(const k of Object.keys(STATE)){ const row=el('div','row'); row.append(el('span','k',k));
    row.append(el('span','v'+(k===changed?' changed':''), STATE[k]===null?'—':String(STATE[k]))); stateEl.append(row); } }
function applyPatch(ops){ let last; for(const op of ops){ if(op.op==='replace'){ const k=op.path.replace(/^\//,''); STATE[k]=op.value; last=k; } } renderState(last); }

const stepNodes={};
function resetSteps(){ stepsEl.innerHTML=''; for(const k in stepNodes) delete stepNodes[k]; }
function stepStart(n){ const s=el('div','step active'); s.append(el('span','mark'),el('span',null,n)); stepsEl.append(s); stepNodes[n]=s; }
function stepDone(n){ if(stepNodes[n]) stepNodes[n].className='step done'; }

function addUser(t){ const m=el('div','msg user'); m.append(el('div','avatar','🧑')); const turn=el('div','turn'); turn.append(el('div','bubble',t)); m.append(turn); chat.append(m); scroll(); }
function addAssistant(){ const m=el('div','msg assistant'); m.append(el('div','avatar','✨')); const turn=el('div','turn'); m.append(turn); chat.append(m); scroll(); return turn; }

let running=false, lastText='';
async function run(text){ if(running)return; lastText=text; addUser(text); await round(text,{}, addAssistant()); }

// One run (POST + stream) into `turn`. `state` carries the human's choices (e.g. unit) on resume.
async function round(text, state, turn){
  running=true; sendBtn.disabled=true; resetSteps();
  let bubble=null, cursor=null, thinkBody=null; const tools={}; const picks={};
  const body={threadId:'t1',runId:'r'+Date.now(),messages:[{id:'m'+Date.now(),role:'user',content:text}],tools:[],context:[],state:state,forwardedProps:{}};
  let resp; try{ resp=await fetch('/invocations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}catch(e){ turn.append(el('div','bubble','[network error] '+e)); return finish(); }
  const rd=resp.body.getReader(), dec=new TextDecoder(); let buf='';
  while(true){ const {done,value}=await rd.read(); if(done)break; buf+=dec.decode(value,{stream:true});
    let nl; while((nl=buf.indexOf('\n'))>=0){ const line=buf.slice(0,nl).trim(); buf=buf.slice(nl+1);
      if(!line.startsWith('data:'))continue; let ev; try{ev=JSON.parse(line.slice(5).trim());}catch(e){continue;} handle(ev); } }
  finish();

  function ensureBubble(){ if(!bubble){ bubble=el('div','bubble'); cursor=el('span','cursor'); bubble.append(cursor); turn.append(bubble);} }
  function finish(){ if(cursor)cursor.remove(); running=false; sendBtn.disabled=false; statusEl.textContent='idle'; scroll(); }

  // HUMAN-IN-THE-LOOP: the frontend's UI for the ask_temperature_unit tool.
  function renderPicker(id){
    let opts=['°C','°F']; try{ const a=JSON.parse(picks[id]||'{}'); if(Array.isArray(a.options)) opts=a.options; }catch(e){}
    const w=el('div','picker'); w.append(el('div','plabel','🙋 The agent is asking you: show temperature in?'));
    for(const u of opts){ const b=el('button',null,u); b.onclick=()=>{ w.querySelectorAll('button').forEach(x=>x.disabled=true); b.classList.add('sel'); statusEl.textContent='resuming…'; round(lastText,{unit:u}, turn); }; w.append(b); }
    turn.append(w); scroll();
  }

  function handle(ev){
    switch(ev.type){
      case 'STATE_SNAPSHOT': STATE={...ev.snapshot}; renderState(); break;
      case 'STATE_DELTA': applyPatch(ev.delta); break;
      case 'STEP_STARTED': stepStart(ev.stepName); statusEl.textContent=ev.stepName; break;
      case 'STEP_FINISHED': stepDone(ev.stepName); break;
      case 'THINKING_START': { const t=el('div','think'); t.append(el('span','lbl','🤔 thinking · '+(ev.title||'')+'\n')); thinkBody=el('span'); t.append(thinkBody); turn.append(t); break; }
      case 'THINKING_TEXT_MESSAGE_CONTENT': if(thinkBody) thinkBody.textContent+=ev.delta; scroll(); break;
      case 'TOOL_CALL_START':
        if(ev.toolCallName==='ask_temperature_unit'){ picks[ev.toolCallId]=''; tools[ev.toolCallId]={picker:true}; break; }
        { const card=el('div','tool'); const hd=el('div','hd'); hd.append(el('span',null,'🔧'),el('span',null,'Calling '+ev.toolCallName)); const bd=el('div','bd',''); card.append(hd,bd); turn.append(card); tools[ev.toolCallId]={bd,args:''}; scroll(); }
        break;
      case 'TOOL_CALL_ARGS': { const t=tools[ev.toolCallId]; if(t&&t.picker){ picks[ev.toolCallId]+=ev.delta; } else if(t){ t.args+=ev.delta; t.bd.textContent=t.args; } break; }
      case 'TOOL_CALL_END': { const t=tools[ev.toolCallId]; if(t&&t.picker){ renderPicker(ev.toolCallId); } break; }
      case 'TOOL_CALL_RESULT': { const t=tools[ev.toolCallId]; if(t&&!t.picker){ t.bd.append(el('div','res','→ '+ev.content)); } break; }
      case 'CUSTOM':
        if(ev.name==='renderComponent' && ev.value && ev.value.component==='WeatherCard'){
          const p=ev.value.props, c=el('div','wcard');
          c.innerHTML='<div class="ic">'+p.icon+'</div><div><div class="city">'+p.city+'</div><div class="temp">'+p.temp+'</div><div class="cond">'+p.condition+'</div></div>';
          turn.append(c); scroll();
        } break;
      case 'TEXT_MESSAGE_CONTENT': ensureBubble(); cursor.insertAdjacentText('beforebegin', ev.delta); scroll(); break;
      case 'RUN_ERROR': { const e=el('div','tool'); e.style.borderColor='#5a1d1d'; e.textContent='⚠ '+(ev.message||'error'); turn.append(e); break; }
    }
    scroll();
  }
}
form.addEventListener('submit',e=>{ e.preventDefault(); const t=input.value.trim(); if(!t)return; input.value=''; run(t); });
</script>
</body>
</html>
